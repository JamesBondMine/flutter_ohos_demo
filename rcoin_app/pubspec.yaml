dependencies:
  cupertino_icons: ^1.0.2
  get: ^4.6.6
  flutter_hooks: ^0.21.2
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  hive_flutter: ^1.1.0
  bot_toast: ^4.0.3
  easy_refresh: ^3.3.2+1
  pull_to_refresh: ^2.0.0
  dio: ^5.5.0
  retrofit: ^4.0.3
  flutter_spinkit: ^5.1.0
  simple_animations: ^5.0.2
  cached_network_image: ^3.4.1
  # 网络状态
  connectivity_plus: ^6.1.4
  event_bus: ^2.0.0
  logger: ^2.5.0
  flutter_native_splash: ^2.3.0
  flutter_screenutil: ^5.8.4
  card_swiper: ^3.0.1
  marquee: ^2.2.3
  flutter_switch: ^0.3.2
  fl_country_code_picker: ^0.1.5
  flutter_svg: 2.0.8
  qr_flutter: ^4.1.0
  pinput: ^5.0.1
  wechat_assets_picker: ^9.5.0
  wechat_camera_picker: ^4.3.7
  camera: ^0.10.5+9
  scan: ^1.6.0
  gallery_saver: ^2.3.2
  package_info_plus: ^8.3.0
  r_upgrade: ^0.4.2
  qr_code_scanner: 1.0.1
  just_audio: 0.9.46
  # 安装应用
  install_plugin: ^2.1.0
  image_gallery_saver: 2.0.3
  permission_handler: ^12.0.0+1
  share_plus: 11.0.0
  flutter_picker: 2.1.0
  photo_view: 0.15.0
  video_player: 2.9.5
  webview_flutter: 4.2.3
  awesome_notifications: 0.10.1
  path_provider: 2.1.5
  scrollview_observer: 1.26.1
  pusher_channels_flutter:
    path: ./../pusher-channels-flutter
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  #  crisp_chat_sdk: ^0.0.6
  url_launcher: ^6.1.14
  pretty_dio_logger: ^1.3.1
  # 检测应用是否在后台
  flutter_fgbg: ^0.7.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  ffi: ^2.1.0
  flutter_image_compress: ^2.3.0
  html: ^0.15.4
#  flutter_html: ^2.2.1

dev_dependencies:
  flutter_lints: ^5.0.0
  build_runner: ^2.3.3
  flutter_gen_runner: ^5.5.0+1
  json_serializable: ^6.5.4
  freezed: ^2.5.0
  retrofit_generator: ^8.0.5
  flutter_launcher_icons: ^0.14.3
  analyzer: 6.4.1
  ffigen: ^9.0.1
  flutter_test:
    sdk: flutter

dependency_overrides:
  image: ^4.0.15
  intl: 0.18.0
  http: ^1.0.0
  webview_flutter: 4.2.3
  flutter_svg: 2.0.8


flutter:
  assets:
    - assets/
    - assets/icon/
    - assets/fonts/
    # - assets/alert_sound/
    - assets/images/
    - assets/images/signin/
    - assets/images/nav/
    - assets/images/home/
    - assets/images/quick_trade/
    - assets/images/mine/
    - assets/images/trade/
    - assets/images/chat/
    - assets/images/team/
    - assets/images/recharge/
    - assets/images/income/
    - assets/newimages/
    - assets/newimages/home/
    - assets/newimages/mine/
    - assets/newimages/auth/
    - assets/newimages/other/
    - assets/newimages/order/
    - assets/newimages/help/
    - assets/newimages/login/
    - assets/newimages/recharge/
    - assets/newimages/launch/splash.png
    - assets/newimages/launch/

  fonts:
    - family: din
      fonts:
        - asset: assets/fonts/DIN-Medium.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
  uses-material-design: true

flutter_native_splash:

    fullscreen: true
    android12: false
    android_12:
      image:assets/newimages/launch/splash.png
flutter_gen:
  output: lib/support_files/
  line_length: 80

ffigen:
  # 生成文件的路径
  output: lib/common/decrypt.dart
  # 生成文件的 class name
  name: Decrypt
  # 生成的描述
  description: Native bindings for Decrypt
  headers:
    entry-points:
      # 头文件，根据库文件会生成具体的方法
      - libnativeffi.h
